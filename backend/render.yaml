services:
  - type: web
    name: ims-backend
    env: php
    plan: free
    buildCommand: composer install --no-interaction --optimize-autoloader --no-dev && php artisan storage:link
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromSecret: ims-db-secrets
        secretKey: DATABASE_URL
      - fromGroup: ims-db-secrets
